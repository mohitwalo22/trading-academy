<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - MOHIT CAPITALS</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>👨‍💼 MOHIT CAPITALS Admin Panel</h1>
</header>

<section class="dashboard">

<h2>Welcome Admin</h2>

<p id="adminEmail">Loading...</p>

<!-- ADD COURSE -->
<div class="card">

<h3>📚 Add New Course</h3>

<form id="courseForm">

<input
type="text"
id="courseName"
placeholder="Course Name"
required
>

<textarea
id="courseDescription"
placeholder="Course Description"
required
></textarea>

<input
type="number"
id="coursePrice"
placeholder="Course Price"
required
>

<button type="submit">
➕ Add Course
</button>

</form>

<p id="courseMessage"></p>

</div>

<!-- STUDENTS -->
<div class="card">

<h3>👥 Registered Students</h3>

<button id="viewStudentsBtn">
View Students
</button>

</div>

<!-- WEBSITE SETTINGS -->
<div class="card">

<h3>⚙️ Website Settings</h3>

<button id="manageWebsiteBtn">
Manage Website
</button>

</div>

<button id="logoutBtn">
Logout
</button>

</section>

<script type="module" src="admin.js"></script>

</body>
</html>
